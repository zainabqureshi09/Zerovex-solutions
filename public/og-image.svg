<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0E1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EAB308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FACC15;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EAB308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- Glow Effects -->
  <circle cx="200" cy="150" r="200" fill="#2563EB" opacity="0.1"/>
  <circle cx="1000" cy="480" r="180" fill="#EAB308" opacity="0.08"/>
  
  <!-- Logo Mark -->
  <g transform="translate(520, 120)">
    <circle cx="80" cy="80" r="80" fill="#0A0E1A" stroke="url(#goldGrad)" stroke-width="3"/>
    <path d="M50 60 h60 l-40 60 h60" stroke="url(#goldGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="130" cy="40" r="10" fill="url(#blueGrad)"/>
  </g>
  
  <!-- Company Name -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-2">
    Zerovex Solutions
  </text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="32" fill="#94A3B8" text-anchor="middle" letter-spacing="4">
    AUTOMATING YOUR BUSINESS. EMPOWERING YOUR GROWTH.
  </text>
  
  <!-- Services -->
  <g transform="translate(600, 480)" text-anchor="middle">
    <text x="-280" y="0" font-family="Arial, sans-serif" font-size="20" fill="#64748B">AI Automation</text>
    <text x="-90" y="0" font-family="Arial, sans-serif" font-size="20" fill="#64748B">Web Development</text>
    <text x="110" y="0" font-family="Arial, sans-serif" font-size="20" fill="#64748B">SaaS Platforms</text>
    <text x="280" y="0" font-family="Arial, sans-serif" font-size="20" fill="#64748B">Custom Software</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="24" fill="#EAB308" text-anchor="middle" letter-spacing="2">
    zerovexsolutions.site
  </text>
  
  <!-- Decorative Line -->
  <line x1="350" y1="520" x2="850" y2="520" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>
</svg>
